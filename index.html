<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dành Cho Kim Yến ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
position:relative;
}

body::before{
content:"";
position:fixed;
inset:0;
background:url("025503e9-a73f-49c1-92e1-fc1ef159b886.jpg");
background-size:cover;
background-position:center;
filter:blur(18px) brightness(.4);
transform:scale(1.1);
z-index:-2;
}

.box{
width:90%;
max-width:700px;
padding:40px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(10px);
border-radius:25px;
text-align:center;
color:white;
}

.photo{
width:220px;
height:220px;
object-fit:cover;
border-radius:50%;
border:4px solid white;
box-shadow:0 0 25px hotpink;
margin-bottom:20px;
}

button{
padding:12px 24px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;
margin-top:20px;
}

#yes{
background:#ff2d55;
color:white;
}

#no{
background:white;
}

.heart{
position:absolute;
font-size:24px;
animation:fly 8s linear forwards;
}

@keyframes fly{
from{transform:translateY(100vh);}
to{transform:translateY(-100px);opacity:0;}
}
</style>

</head>

<body>

<div class="box" id="app">

<h1>Có một điều tớ muốn nói với cậu...</h1>

<button onclick="page2()">
Mở bức thư 💌
</button>

</div>

<script>

function page2(){

app.innerHTML=`

<img class="photo"
src="025503e9-a73f-49c1-92e1-fc1ef159b886.jpg">

<h1>Who stole my heart?</h1>

<h2>It's You ❤️</h2>

<button onclick="page3()">
Tiếp tục
</button>

`;

}

function page3(){

app.innerHTML=`

<img class="photo"
src="025503e9-a73f-49c1-92e1-fc1ef159b886.jpg">

<h1>Kim Yến à...</h1>

<p>

Tớ đã suy nghĩ rất lâu
mới dám làm trang web này.

<br><br>

Có thể nó không hoàn hảo.

<br><br>

Nhưng tất cả những gì ở đây
đều là thật lòng.

</p>

<button onclick="page4()">
Tiếp tục ❤️
</button>

`;

}

function page4(){

app.innerHTML=`

<h1>📸 Một vài khoảnh khắc</h1>

<br>

<img class="photo"
src="025503e9-a73f-49c1-92e1-fc1ef159b886.jpg">

<br>

<p>
Nếu có thêm ảnh khác,
m có thể thay vào đây.
</p>

<button onclick="page5()">
Tiếp tục
</button>

`;

}

function page5(){

app.innerHTML=`

<h1>✨ Những điều tớ thích ở cậu ✨</h1>

<br>

<p>🌷 Dễ thương</p>
<p>🌷 Hay cười</p>
<p>🌷 Tốt bụng</p>
<p>🌷 Quan tâm người khác</p>
<p>🌷 Là chính mình</p>

<button onclick="page6()">
Tiếp tục ❤️
</button>

`;

}

function page6(){

app.innerHTML=`

<img class="photo"
src="025503e9-a73f-49c1-92e1-fc1ef159b886.jpg">

<h1>
Cho tớ một cơ hội được không?
</h1>

<button id="yes" onclick="page7()">
Có ❤️
</button>

<button id="no">
Để suy nghĩ 🤭
</button>

`;

const no=document.getElementById("no");

no.addEventListener("mouseover",()=>{

no.style.position="absolute";
no.style.left=Math.random()*80+"vw";
no.style.top=Math.random()*80+"vh";

});

}

function page7(){

app.innerHTML=`

<h1 style="font-size:70px">🎉</h1>

<h1>MISSION COMPLETE</h1>

<h2>New Partner Unlocked ❤️</h2>

`;

}

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);

}

setInterval(createHeart,500);

</script>

</body>
</html>
