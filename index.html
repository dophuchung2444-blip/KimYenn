<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dành Cho Kim Yến ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

/* nền 3 phần */

.bg{
position:fixed;
inset:0;
display:flex;
overflow:hidden;
z-index:-2;
}

.part{
flex:1;

background-image:url("IMG_4757.JPG");

background-size:cover;
background-repeat:no-repeat;

filter:blur(20px) brightness(.4);

transform:scale(1.15);
}

.left{
background-position:left center;
}

.center{
background-position:center center;
}

.right{
background-position:right center;
}

/* lớp tối phủ lên nền */

.bg::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.25);
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
position:relative;
}

.box{
width:90%;
max-width:700px;

padding:40px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(10px);

border-radius:25px;

text-align:center;

color:white;

position:relative;
z-index:2;
}

.photo{
width:220px;
height:220px;

object-fit:cover;

border-radius:50%;

border:4px solid white;

box-shadow:0 0 25px hotpink;

margin-bottom:20px;
}

button{
padding:12px 24px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;
margin-top:20px;
}

#yes{
background:#ff2d55;
color:white;
}

#no{
background:white;
}

.heart{
position:absolute;
font-size:24px;
animation:fly 8s linear forwards;
}

@keyframes fly{
from{
transform:translateY(100vh);
}
to{
transform:translateY(-100px);
opacity:0;
}
}

</style>
</head>

<body>
  <div class="bg">
    <div class="part left"></div>
    <div class="part center"></div>
    <div class="part right"></div>
</div>

<div class="box" id="app">

<h1>Có một điều tớ muốn nói với cậu...</h1>

<button onclick="page2()">
Mở bức thư 💌
</button>

</div>

<script>

function page2(){

app.innerHTML=`

<img class="photo"
src="025503e9-a73f-49c1-92e1-fc1ef159b886.jpg">

<h1>ai là cô gái tuyệt vời đã bước vào trái tim của tui nhỉ?</h1>

<h2>Nguyễn Trần Kim Yến chớ ai</h2>

<button onclick="page3()">
Típ nè
</button>

`;

}

function page3(){

app.innerHTML=`

<img class="photo"
src="025503e9-a73f-49c1-92e1-fc1ef159b886.jpg">

<h1>Kim Yến à...</h1>

<p>

Tớ đã suy nghĩ rất lâu
mới dám làm trang web này.

<br><br>

Có thể nó không hoàn hảo.

<br><br>

Nhưng tất cả những gì ở đây
đều là thật lòng.

</p>

<button onclick="page4()">
típ đi quớ ngại
</button>

`;

}

function page4(){

app.innerHTML=`

<h1>📸 Một vài khoảnh khắc</h1>

<br>

<img class="photo"
src="025503e9-a73f-49c1-92e1-fc1ef159b886.jpg">

<br>

<p>
tui nghĩ thêm 1 vài khoảnh khắc của tụi mình vào thì tình hơnnn
</p>

<button onclick="page5()">
qua típ nhe
</button>

`;

}

function page5(){

app.innerHTML=`

<h1>✨những điều tui thích ở Kim Yến✨</h1>

<br>

<p>🌷 sao phải đọc nhỉ</p>
<p>🌷 tui thích tất cả của Kim Yến lun í</p>
<p>🌷 mọi khoảnh khắc lun không chừa 1 lúc nào hết</p>
<p>🌷 đặc biệt là có thể nghe tui lải nhải quài</p>
<p>🌷 thích mọi thứ ở Kim Yến </p>

<button onclick="page6()">
còn 1 trang nữa này quan trọng nhấtt
</button>

`;

}

function page6(){

app.innerHTML=`

<img class="photo"
src="025503e9-a73f-49c1-92e1-fc1ef159b886.jpg">

<h1>
Cho tớ một cơ hội được không?
</h1>

<button id="yes" onclick="page7()">
Có ❤️
</button>

<button id="no">
Để suy nghĩ 🤭
</button>

`;

const no=document.getElementById("no");

no.addEventListener("mouseover",()=>{

no.style.position="absolute";
no.style.left=Math.random()*80+"vw";
no.style.top=Math.random()*80+"vh";

});

}

function page7(){

app.innerHTML=`

<h1 style="font-size:70px">🎉</h1>

<h1>MISSION COMPLETE</h1>

<h2>New Partner Unlocked ❤️</h2>

`;

}

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);

}

setInterval(createHeart,500);

</script>

</body>
</html>
